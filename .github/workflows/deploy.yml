name: Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # الخطوة دي هتدور على الملف لوحدها وتعمله بابلش وتمنع ملفات لينكس اللي بتبوظ الرفع
      - name: Publish project
        run: |
          PROJECT_PATH=$(find . -name "GymManagementSystem.WebUI.csproj" | head -n 1)
          echo "Found project at: $PROJECT_PATH"
          dotnet publish "$PROJECT_PATH" -c Release -o publish -p:UseAppHost=false

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
