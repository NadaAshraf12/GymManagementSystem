name: Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: |
          PROJECT_PATH=$(find . -name "GymManagementSystem.WebUI.csproj" | head -n 1)
          echo "Found project at: $PROJECT_PATH"
          dotnet publish "$PROJECT_PATH" -c Release -o publish -p:UseAppHost=false

      - name: Create maintenance file
        run: echo "<html><body><h1>Updating website...</h1></body></html>" > app_offline.htm

      - name: Upload maintenance file
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /wwwroot/
          include: |
            app_offline.htm

      - name: Deploy website
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/

      - name: Remove maintenance file
        if: always()
        continue-on-error: true
        run: |
          SERVER=$(echo "${{ secrets.FTP_SERVER }}" | tr -d '\r\n ' | sed 's/ftp:\/\///g')
          curl -Q "DELE wwwroot/app_offline.htm" "ftp://$SERVER/" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
