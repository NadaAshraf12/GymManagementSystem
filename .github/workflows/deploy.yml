name: Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: |
          PROJECT_PATH=$(find . -name "GymManagementSystem.WebUI.csproj" | head -n 1)
          echo "Found project at: $PROJECT_PATH"
          dotnet publish "$PROJECT_PATH" -c Release -o publish -p:UseAppHost=false

      - name: Create maintenance file
        run: echo "<html><body><h1>Updating website...</h1></body></html>" > app_offline.htm

      - name: Upload maintenance file
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /wwwroot/
          include: |
            app_offline.htm

      - name: Deploy website
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          dangerous-clean-slate: true

      - name: Remove maintenance file
        run: rm app_offline.htm
