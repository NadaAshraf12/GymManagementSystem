name: Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish project
        run: |
          PROJECT_PATH=$(find . -name "GymManagementSystem.WebUI.csproj" | head -n 1)
          echo "Found project at: $PROJECT_PATH"
          dotnet publish "$PROJECT_PATH" -c Release -o publish -p:UseAppHost=false

      # الخطوة دي بترفع ملف app_offline.htm عشان توقف الموقع وتفك القفل من على الملفات
      - name: Put site offline
        run: |
          echo "<html><body><h1>Site is updating, please wait a minute...</h1></body></html>" > app_offline.htm
          curl -T app_offline.htm ftp://${{ secrets.FTP_SERVER }}/wwwroot/app_offline.htm --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          sleep 5

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/

      # الخطوة دي بتمسح ملف app_offline.htm بعد الرفع عشان الموقع يرجع يشتغل
      # استخدمنا if: always() عشان يمسح الملف حتى لو خطوة الرفع فشلت لا قدر الله
      - name: Bring site back online
        if: always()
        run: |
          curl -Q "DELE /wwwroot/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
